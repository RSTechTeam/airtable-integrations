name: 'Abacus x Airtable Action'
description: 'Parse Abacus CSV exports into Airtable'
inputs:
  airtable-api-key:
    description: 'The Airtable API key to use for Airtable interactions'
    required: true
  airtable-base-id:
    description: 'The ID of the Airtable Base used in the target program'
    required: true
  emburse-sftp-username:
    description: 'The username for accessing the Emburse SFTP server'
    required: false
  emburse-sftp-key:
    description: 'The private key for accessing the Emburse SFTP server'
    required: false
  airtable-import-record-id:
    description: 'The ID of the Airtable Record whose CSVs should be parsed and integrated'
    required: false
runs:
  using: 'node24'
  main: 'index.js'
